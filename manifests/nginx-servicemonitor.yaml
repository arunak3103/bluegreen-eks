apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nginx-exporter
  namespace: monitoring
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - demo

  selector:
    matchLabels:
      app: nginx-exporter

  endpoints:
    - port: http
      interval: 15s
      path: /metrics