apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-green
  namespace: demo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: demo
      version: green

  template:
    metadata:
      labels:
        app: demo
        version: green

    spec:
      containers:
      - name: nginx
        image: 467685081921.dkr.ecr.us-east-1.amazonaws.com/bluegreen-demo:b4406f07f864b0a496f1ba506c7e18e01db266ee

        ports:
        - containerPort: 80

      