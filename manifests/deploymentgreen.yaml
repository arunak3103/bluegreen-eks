apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-green
  namespace: demo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: demo
      version: green

  template:
    metadata:
      labels:
        app: demo
        version: green

    spec:
      containers:
      - name: nginx
        image: 467685081921.dkr.ecr.us-east-1.amazonaws.com/bluegreen-demo:4dac0252743a1a093c5ea7dab8c93b96881e257c

        ports:
        - containerPort: 80

      